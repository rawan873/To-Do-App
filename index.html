<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="statscontainer">
            <div class="details">
                <h1>to-do done </h1>
                <p>keep it up!</p>
                <div id="progress">
                    <div id="progressbar"></div>
                </div>
            </div>
            <div class="num-con">
                <p id="number">0/0</p>
            </div>
        </div>
        <form action="">
            <input type="text" id="task-name" class="taskname" placeholder="Enter Your Task...">
            <button type="submit">+</button>
        </form>
        <ul id="tasks"></ul>
    </div>

</body>
<script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@4.2.1/tsparticles.confetti.bundle.min.js"></script>
<script src="index.js"></script>

</html>
